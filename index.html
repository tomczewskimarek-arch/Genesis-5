<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genealogia Genesis 5 — Oś Czasu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e1a2b;
    color: #e8e0d0;
    font-family: Georgia, serif;
    padding: 28px 20px 40px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    color: #f0c060;
    letter-spacing: 2px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  h2 {
    text-align: center;
    font-size: 0.9rem;
    color: #8aabcc;
    font-weight: normal;
    font-style: italic;
    margin-bottom: 26px;
    letter-spacing: 1px;
  }
  #chart-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  svg#chart {
    display: block;
  }
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 16px;
    font-size: 0.8rem;
    color: #8aabcc;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .ld { width: 12px; height: 12px; border-radius: 50%; }
  .ll { width: 26px; height: 3px; border-radius: 2px; }
  .facts {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 10px;
    font-size: 0.81rem;
    color: #8aabcc;
  }
  .fact {
    padding: 9px 13px;
    background: #12213a;
    border-radius: 7px;
    border-left: 3px solid #c5900c;
    line-height: 1.55;
  }
  .fact strong { color: #f0c060; }
</style>
</head>
<body>

<h1>Genealogia Księgi Rodzaju 5</h1>
<h2>Od Adama do Noego — oś czasu narodzin, śmierci i długości życia</h2>

<div id="chart-wrap">
  <svg id="chart"></svg>
</div>

<div class="legend">
  <div class="legend-item"><div class="ld" style="background:#4a9eff"></div> Narodziny</div>
  <div class="legend-item"><div class="ld" style="background:#ff6b6b"></div> Śmierć</div>
  <div class="legend-item"><div class="ld" style="background:#ffd700"></div> Zabrany przez Boga</div>
  <div class="legend-item"><div class="ll" style="background:#ff3333"></div> Rok Potopu (1656 AM)</div>
</div>

<div class="facts" id="facts"></div>

<script>
(function() {

  // ── dane ────────────────────────────────────────────────────────────────────
  var people = [
    { name: "Adam",       born: 0,    died: 930,  years: 930, taken: false },
    { name: "Set",        born: 130,  died: 1042, years: 912, taken: false },
    { name: "Enosz",      born: 235,  died: 1140, years: 905, taken: false },
    { name: "Kainan",     born: 325,  died: 1235, years: 910, taken: false },
    { name: "Mahalaleel", born: 395,  died: 1290, years: 895, taken: false },
    { name: "Jered",      born: 460,  died: 1422, years: 962, taken: false },
    { name: "Henoch",     born: 622,  died: 987,  years: 365, taken: true  },
    { name: "Matuzalem",  born: 687,  died: 1656, years: 969, taken: false },
    { name: "Lamech",     born: 874,  died: 1651, years: 777, taken: false },
    { name: "Noe",        born: 1056, died: 2006, years: 950, taken: false },
  ];

  var FLOOD   = 1656;
  var MIN_Y   = 0;
  var MAX_Y   = 2100;
  var COLORS  = ["#e8a44a","#6cb8e8","#7dd9a0","#d47af5","#f07070",
                 "#f5c842","#5ec8c8","#e88060","#90b8ff","#50c878"];

  var ML = 115, MR = 30, MT = 30, MB = 50;
  var ROW_H = 56, BAR_H = 22;
  var W = 1160, H = MT + people.length * ROW_H + MB;

  // ── helpers ─────────────────────────────────────────────────────────────────
  function xScale(yr) {
    return ML + (yr - MIN_Y) / (MAX_Y - MIN_Y) * (W - ML - MR);
  }

  function el(tag, attrs, text) {
    var ns = "http://www.w3.org/2000/svg";
    var node = document.createElementNS(ns, tag);
    for (var k in attrs) node.setAttribute(k, attrs[k]);
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function starPoints(cx, cy, R, r, n) {
    var pts = [];
    for (var i = 0; i < n * 2; i++) {
      var radius = (i % 2 === 0) ? R : r;
      var angle  = (i * Math.PI / n) - Math.PI / 2;
      pts.push((cx + radius * Math.cos(angle)).toFixed(2) + "," +
               (cy + radius * Math.sin(angle)).toFixed(2));
    }
    return pts.join(" ");
  }

  // ── build SVG ───────────────────────────────────────────────────────────────
  var svg = document.getElementById("chart");
  svg.setAttribute("width",   W);
  svg.setAttribute("height",  H);
  svg.setAttribute("viewBox", "0 0 " + W + " " + H);

  // grid + labels
  for (var yr = 0; yr <= MAX_Y; yr += 200) {
    var gx = xScale(yr);
    svg.appendChild(el("line", { x1: gx, y1: MT, x2: gx, y2: H - MB,
      stroke: "#1e3050", "stroke-width": 1 }));
    svg.appendChild(el("text", {
      x: gx, y: H - MB + 18,
      "text-anchor": "middle", fill: "#4a6080",
      "font-size": 11, "font-family": "Georgia"
    }, yr === 0 ? "0" : yr + " AM"));
  }

  // axis
  svg.appendChild(el("line", {
    x1: ML, y1: H - MB, x2: W - MR, y2: H - MB,
    stroke: "#2a4060", "stroke-width": 2
  }));

  // flood line
  var fx = xScale(FLOOD);
  svg.appendChild(el("line", { x1: fx, y1: MT - 5, x2: fx, y2: H - MB,
    stroke: "#ff2222", "stroke-width": 2.5,
    "stroke-dasharray": "7,4", opacity: 0.9 }));
  svg.appendChild(el("text", { x: fx + 5, y: MT + 14,
    fill: "#ff6060", "font-size": 11, "font-family": "Georgia",
    "font-style": "italic" }, "Potop 1656 AM"));

  // rows
  people.forEach(function(p, i) {
    var cy   = MT + i * ROW_H + ROW_H / 2;
    var barY = cy - BAR_H / 2;
    var x1   = xScale(p.born);
    var x2   = xScale(p.died);
    var barW = Math.max(x2 - x1, 4);
    var col  = COLORS[i];

    // zebra bg
    if (i % 2 === 0) {
      svg.appendChild(el("rect", {
        x: ML, y: MT + i * ROW_H,
        width: W - ML - MR, height: ROW_H,
        fill: "#12213a", opacity: 0.35
      }));
    }

    // bar
    svg.appendChild(el("rect", {
      x: x1, y: barY, width: barW, height: BAR_H,
      rx: 5, fill: col, opacity: 0.8
    }));
    // shine
    svg.appendChild(el("rect", {
      x: x1, y: barY, width: barW, height: BAR_H / 2,
      rx: 5, fill: "white", opacity: 0.07
    }));

    // birth dot
    svg.appendChild(el("circle", {
      cx: x1, cy: cy, r: 5, fill: "#4a9eff",
      stroke: "white", "stroke-width": 1.5
    }));

    // birth label (above bar)
    svg.appendChild(el("text", {
      x: x1 + 2, y: barY - 4,
      fill: col, "font-size": 10, "font-family": "Georgia"
    }, p.born));

    if (p.taken) {
      // star for Enoch
      svg.appendChild(el("polygon", {
        points: starPoints(x2, cy, 7, 3, 5),
        fill: "#ffd700", stroke: "white", "stroke-width": 1
      }));
      svg.appendChild(el("text", {
        x: x2 + 10, y: cy + 4,
        fill: "#ffd700", "font-size": 10, "font-family": "Georgia",
        "font-style": "italic"
      }, "zabrany przez Boga"));
    } else {
      svg.appendChild(el("circle", {
        cx: x2, cy: cy, r: 5, fill: "#ff6b6b",
        stroke: "white", "stroke-width": 1.5
      }));
    }

    // death label (above bar)
    svg.appendChild(el("text", {
      x: x2 - 2, y: barY - 4,
      "text-anchor": "end",
      fill: p.taken ? "#ffd700" : "#ff9090",
      "font-size": 10, "font-family": "Georgia"
    }, p.died));

    // age inside bar
    if (barW > 55) {
      svg.appendChild(el("text", {
        x: (x1 + x2) / 2, y: cy + 4,
        "text-anchor": "middle", fill: "white",
        "font-size": 11, "font-family": "Georgia",
        "font-weight": "bold", opacity: 0.92
      }, p.years + " lat"));
    }

    // name label (left margin)
    svg.appendChild(el("text", {
      x: ML - 8, y: cy + 4,
      "text-anchor": "end", fill: col,
      "font-size": 13, "font-family": "Georgia",
      "font-weight": "bold"
    }, p.name));
  });

  // ── ciekawostki ──────────────────────────────────────────────────────────────
  var facts = [
    { label: "Najdłuższe życie",             val: "Matuzalem — 969 lat (687–1656 AM)" },
    { label: "Najkrótsze życie",             val: "Henoch — 365 lat, zabrany przez Boga" },
    { label: "Rok Potopu",                   val: "1656 AM — Noe miał dokładnie 600 lat" },
    { label: "Matuzalem zm. roku Potopu",    val: "Trad. żydowska: Bóg czekał 7 dni po jego śmierci" },
    { label: "Lamech zm. 5 lat przed Potopem", val: "Rok 1651 AM — nie dożył katastrofy" },
    { label: "Adam i Noe nigdy się nie spotkali", val: "Adam zm. 930, Noe ur. 1056 (różnica 126 lat)" },
    { label: "Adam żył do r. 930",           val: "Był współczesny Lamechowi przez 56 lat" },
    { label: "Henoch — 7. od Adama",         val: "\"Chodził z Bogiem i nie było go\" (Rdz 5,24)" },
    { label: "Całość genealogii",            val: "2006 lat: od Adama do śmierci Noego" },
    { label: "Adam mógł znać Henocha",       val: "Henoch ur. 622, Adam zm. 930 — 308 lat razem" },
  ];
  var factsEl = document.getElementById("facts");
  facts.forEach(function(f) {
    var d = document.createElement("div");
    d.className = "fact";
    d.innerHTML = "<strong>" + f.label + ":</strong><br>" + f.val;
    factsEl.appendChild(d);
  });

})();
</script>
</body>
</html>
